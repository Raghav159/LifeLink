version: '3.9'

services:
  database:
    image: postgres:16-alpine
    container_name: lifelink-db
    environment:
      POSTGRES_USER: ${DB_USER:-lifelink_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lifelink_password}
      POSTGRES_DB: ${DB_NAME:-lifelink_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-lifelink_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lifelink-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: lifelink-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-REMOVED${DB_USER:-lifelink_user}:${DB_PASSWORD:-lifelink_password}@database:5432/${DB_NAME:-lifelink_db}}
      APP_ENV: ${APP_ENV:-production}
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-here}
      MODEL_PATH: ${MODEL_PATH:-/app/ml/models}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - lifelink-network
    restart: unless-stopped
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: lifelink-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - lifelink-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  lifelink-network:
    driver: bridge
